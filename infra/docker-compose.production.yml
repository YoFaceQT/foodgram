version: '3.3'

volumes:
  pg_data:
  static:
  media:

services:

  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: yoface/foodgram_backend
    env_file: .env
    volumes:
      - static:/backend_static
      - media:/app/media
    depends_on:
      - db

  frontend:
    image: yoface/foodgram_frontend
    env_file: .env
    volumes:
      - ../frontend/:/app/result_build/
    depends_on:
      - db

  gateway:
    image: yoface/foodgram_gateway
    env_file: .env
    ports:
      - 7000:80
    volumes:
      - ../frontend/build:/usr/share/nginx/html/
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static:/var/html/static/
      - media:/media
    depends_on:
      - backend
      - frontend